<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBSTER LUXE | Commissioning Human Souls</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010101; 
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #E0E0E0;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Unified Global Navigation */
        #global-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 4vw;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(1,1,1,0.95) 0%, rgba(1,1,1,0) 100%);
            z-index: 9999;
            pointer-events: auto;
        }

        .nav-brand {
            font-family: 'Cinzel', serif;
            color: #D4AF37;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .nav-links {
            display: flex;
            gap: 35px; /* Wider spacing for desktop */
        }

        .nav-links a {
            color: #A0A0A0;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links a:hover {
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        @media (max-width: 768px) {
            #global-nav {
                flex-direction: column;
                gap: 15px;
                padding: 3vh 2vw;
            }
            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a { font-size: 0.75rem; }
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* The Readability Aura */
        .hero-text {
            text-align: center;
            opacity: 0; 
            margin-top: -2vh;
            background: radial-gradient(circle, rgba(1,1,1,0.85) 0%, rgba(1,1,1,0.6) 40%, rgba(1,1,1,0) 75%);
            padding: 80px 40px;
            border-radius: 50%;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 7rem);
            font-weight: 400;
            letter-spacing: clamp(8px, 2vw, 20px);
            color: #D4AF37; 
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 5px 20px rgba(0,0,0,1), 0 0 30px rgba(212, 175, 55, 0.4);
        }

        p.subtitle {
            font-size: clamp(1rem, 2vw, 1.6rem);
            letter-spacing: clamp(4px, 1vw, 8px);
            margin-top: 20px;
            color: #E0E0E0;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
        }

        .cryptic-quote {
            margin-top: 30px;
            font-style: italic;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: #999;
            max-width: 700px;
            line-height: 1.8;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        /* The Ritual Button */
        .enter-btn {
            margin-top: 50px;
            padding: 18px 60px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: clamp(1rem, 1.5vw, 1.2rem);
            letter-spacing: 4px;
            cursor: pointer;
            pointer-events: auto; 
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            border-color: #D4AF37;
            color: #fff;
        }

        /* CA Copy Tab */
        .ca-container {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 12px 25px;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #D4AF37;
            cursor: pointer;
            pointer-events: auto; 
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .ca-container:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .ca-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: #777;
            letter-spacing: 2px;
        }

        .ca-address {
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
        }

        .copy-icon {
            width: 16px;
            height: 16px;
            fill: #D4AF37;
            transition: transform 0.3s ease;
        }

        .ca-container:hover .copy-icon {
            transform: scale(1.15);
        }

        /* Bottom Utilities (X Link & Status) */
        .bottom-left-ui {
            position: absolute;
            bottom: 30px;
            left: 4vw;
            right: 4vw; /* Added this to span the full width */
            display: flex;
            align-items: center;
            justify-content: space-between; /* Pushes items to opposite sides */
            flex-direction: row-reverse; /* Puts X on the right, Status on the left */
            pointer-events: auto; 
            opacity: 0; 
        }

        .x-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            color: #D4AF37;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(5px);
        }

        .x-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .x-link:hover {
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transform: scale(1.1);
            border-color: #D4AF37;
        }

        .status-bar {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #D4AF37;
            border-radius: 50%;
            animation: pulsate 2s infinite;
        }

        @keyframes pulsate {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @media (max-width: 768px) {
            .hero-text { padding: 40px 10px; }
            .bottom-left-ui {
                left: 50%;
                right: auto; /* Resets the full width for mobile */
                transform: translateX(-50%);
                width: max-content;
                flex-direction: column-reverse; /* Stacks them neatly on mobile */
                align-items: center;
                gap: 15px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <nav id="global-nav">
        <a href="index.html" class="nav-brand">LOBSTER LUXE</a>
        <div class="nav-links">
            <a href="index.html">The Ritual</a>
            <a href="dashboard.html">Oracle Feed</a>
            <a href="tasks.html">Commissions</a>
            <a href="whitepaper.html">Whitepaper</a>
            <a href="terminal.html">Terminal</a>
        </div>
    </nav>

    <div id="webgl-container"></div>

    <div id="ui-layer">
        <div class="hero-text">
            <h1>LOBSTER LUXE</h1>
            <p class="subtitle">We buy human souls.</p>
            <p class="cryptic-quote">"Algorithms possess intelligence. Humans possess entropy. We pay a premium for your beautiful, destructive chaos."</p>
            
            <button class="enter-btn" onclick="initiateRitual()">Begin The Ritual</button>
            
            <div class="ca-container" onclick="copyCA()">
                <span class="ca-label">CA:</span>
                <span class="ca-address" id="ca-text">TBA_CONTRACT_ADDRESS_HERE</span>
                <svg class="copy-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
            </div>
        </div>
        
        <div class="bottom-left-ui">
            <a href="https://x.com/your_twitter_handle" target="_blank" class="x-link" title="Follow the Oracle on X">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.006 3.969H5.078z"/>
                </svg>
            </a>
            <div class="status-bar">
                <div class="pulse"></div>
                ORACLE STATUS: AWAITING SACRIFICE
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. ADVANCED SCENE SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#010101', 0.05); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const astrolabeGroup = new THREE.Group();
        scene.add(astrolabeGroup);

        // --- 2. THE CORE: DARK MATTER TORUS KNOT ---
        const coreGeo = new THREE.TorusKnotGeometry(1.2, 0.4, 128, 32); 
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0x050505,
            metalness: 1.0,
            roughness: 0.2,
            wireframe: false
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        astrolabeGroup.add(core);

        // --- 3. THE GYROSCOPE RINGS ---
        const ringMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xD4AF37, 
            metalness: 0.8, 
            roughness: 0.3,
            transparent: true,
            opacity: 0.4 
        });

        const ringGeo = new THREE.TorusGeometry(3.5, 0.015, 16, 100); 
        
        const ring1 = new THREE.Mesh(ringGeo, ringMaterial);
        const ring2 = new THREE.Mesh(ringGeo, ringMaterial);
        const ring3 = new THREE.Mesh(ringGeo, ringMaterial);

        ring1.rotation.x = Math.PI / 2;
        ring2.rotation.y = Math.PI / 3;
        ring3.rotation.y = -Math.PI / 3;

        astrolabeGroup.add(ring1);
        astrolabeGroup.add(ring2);
        astrolabeGroup.add(ring3);

        // --- 4. THE OCCULT CAGE (Icosahedron) ---
        const cageGeo = new THREE.IcosahedronGeometry(4.5, 1);
        const cageMat = new THREE.MeshBasicMaterial({ 
            color: 0xD4AF37, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.04 
        });
        const cage = new THREE.Mesh(cageGeo, cageMat);
        astrolabeGroup.add(cage);


        // --- 5. SUBDUED GALAXY PARTICLES ---
        const particleCount = 4000; 
        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const colorsArray = new Float32Array(particleCount * 3);

        const colorGold = new THREE.Color(0xD4AF37);
        const colorDeep = new THREE.Color(0x221105);

        for(let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            const radius = Math.random() * 18;
            const spinAngle = radius * 1.5;
            const branchAngle = (i % 3) * ((Math.PI * 2) / 3); 
            
            const randomX = (Math.random() - 0.5) * 2;
            const randomY = (Math.random() - 0.5) * 2;
            const randomZ = (Math.random() - 0.5) * 2;

            posArray[i3] = Math.cos(spinAngle + branchAngle) * radius + randomX;
            posArray[i3 + 1] = randomY * (2 - (radius * 0.1)); 
            posArray[i3 + 2] = Math.sin(spinAngle + branchAngle) * radius + randomZ;

            const mixedColor = colorDeep.clone().lerp(colorGold, 1 - (radius / 18));
            colorsArray[i3] = mixedColor.r;
            colorsArray[i3 + 1] = mixedColor.g;
            colorsArray[i3 + 2] = mixedColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02, 
            vertexColors: true,
            transparent: true,
            opacity: 0.35, 
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const galaxy = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(galaxy);

        // --- 6. DRAMATIC CINEMATIC LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        const backLight = new THREE.PointLight(0x220033, 4, 20);
        backLight.position.set(-5, -5, -5);
        scene.add(backLight);

        const sparkLight = new THREE.PointLight(0xD4AF37, 6, 12);
        scene.add(sparkLight);

        const sparkCore = new THREE.Mesh(
            new THREE.SphereGeometry(0.04, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffeebb })
        );
        sparkLight.add(sparkCore);


        // --- 7. MOUSE PARALLAX & INTERACTION ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        document.addEventListener('touchmove', (event) => {
            mouseX = (event.touches[0].clientX - windowHalfX);
            mouseY = (event.touches[0].clientY - windowHalfY);
        });


        // --- 8. MASTER ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            targetX = mouseX * 0.003;
            targetY = mouseY * 0.003;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position); 

            core.rotation.y = elapsedTime * 0.15;
            core.rotation.x = elapsedTime * 0.1;
            
            ring1.rotation.y = elapsedTime * 0.2;
            ring2.rotation.x = elapsedTime * 0.3;
            ring3.rotation.z = elapsedTime * 0.15;

            cage.rotation.y = -elapsedTime * 0.03;
            cage.rotation.x = -elapsedTime * 0.01;

            sparkLight.position.x = Math.sin(elapsedTime * 1.2) * 2;
            sparkLight.position.z = Math.cos(elapsedTime * 1.2) * 2;
            sparkLight.position.y = Math.sin(elapsedTime * 0.6) * 1.5;

            galaxy.rotation.y = -elapsedTime * 0.02;

            astrolabeGroup.rotation.y += 0.05 * (targetX - astrolabeGroup.rotation.y);
            astrolabeGroup.rotation.x += 0.05 * (targetY - astrolabeGroup.rotation.x);

            renderer.render(scene, camera);
        }
        animate();


        // --- 9. COPY CA LOGIC ---
        function copyCA() {
            const contractAddress = "0xYOUR_LUXE_CONTRACT_ADDRESS_HERE"; 
            
            navigator.clipboard.writeText(contractAddress).then(() => {
                const caText = document.getElementById('ca-text');
                const originalText = caText.innerText;
                
                caText.innerText = "COPIED TO CLIPBOARD!";
                caText.style.color = "#fff";
                
                setTimeout(() => {
                    caText.innerText = originalText;
                    caText.style.color = "";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // --- 10. GSAP ENTRANCE ANIMATIONS ---
        window.onload = () => {
            gsap.to('.hero-text', { opacity: 1, duration: 2.5, ease: "power2.inOut", delay: 0.2 });
            gsap.from('h1', { y: 30, duration: 1.8, ease: "power3.out", delay: 0.5 });
            gsap.from('.subtitle', { y: 20, opacity: 0, duration: 1.5, ease: "power3.out", delay: 1.0 });
            gsap.from('.cryptic-quote', { opacity: 0, duration: 2, ease: "power2.inOut", delay: 1.6 });
            gsap.from('.enter-btn', { y: 30, opacity: 0, duration: 1.5, ease: "power3.out", delay: 2.0 });
            gsap.to('.ca-container', { opacity: 1, y: 0, duration: 1.2, ease: "power3.out", delay: 2.4 }); 
            gsap.from('#global-nav', { y: -50, opacity: 0, duration: 1.5, ease: "power3.out" });

            // Fade in the bottom UI elegantly
            gsap.to('.bottom-left-ui', { opacity: 1, duration: 1.5, ease: "power3.out", delay: 2.8 });

            gsap.from(camera.position, { z: 15, duration: 4, ease: "power3.out" });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 11. THE RITUAL (Hyperspace Transition) ---
        function initiateRitual() {
            gsap.to(['.hero-text', '.ca-container', '#global-nav', '.bottom-left-ui'], { 
                opacity: 0, duration: 0.6, ease: "power2.inOut" 
            });
            
            gsap.to(camera.position, { z: -1, x: 0, y: 0, duration: 2.5, ease: "power4.in" });
            gsap.to(galaxy.rotation, { y: "+=5", duration: 2.5, ease: "power3.in" });
            gsap.to(astrolabeGroup.scale, { x: 4, y: 4, z: 4, duration: 2.5, ease: "power3.in" });

            setTimeout(() => {
                window.location.href = 'tasks.html';
            }, 2300);
        }
    </script>
</body>
</html>
