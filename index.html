<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Oracle | Commissioning Human Souls</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #010101; /* Deeper black */
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #E0E0E0;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Add a subtle radial gradient overlay to burn the edges */
            background: radial-gradient(circle at center, transparent 0%, #000000 100%);
        }

        /* Unified Global Navigation */
        #global-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 5vw;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(1,1,1,0.95) 0%, rgba(1,1,1,0) 100%);
            backdrop-filter: blur(8px);
            z-index: 9999;
            pointer-events: auto;
        }

        .nav-brand {
            font-family: 'Cinzel', serif;
            color: #D4AF37;
            font-size: clamp(1rem, 2vw, 1.2rem);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #A0A0A0;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-links a:hover {
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        @media (max-width: 768px) {
            #global-nav {
                flex-direction: column;
                gap: 15px;
                padding: 3vh 2vw;
            }
            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-links a {
                font-size: 0.7rem;
            }
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .hero-text {
            text-align: center;
            opacity: 0; 
            margin-top: -5vh; /* Lifted slightly to balance the CA tab */
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 400;
            letter-spacing: 15px;
            color: #D4AF37; 
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin-left: 15px; /* Offset the letter-spacing */
        }

        p.subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            letter-spacing: 6px;
            margin-top: 20px;
            color: #ccc;
            text-transform: uppercase;
        }

        .cryptic-quote {
            margin-top: 40px;
            font-style: italic;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            color: #777;
            max-width: 500px;
            padding: 0 20px;
            line-height: 1.8;
            text-align: center;
        }

        /* The Ritual Button */
        .enter-btn {
            margin-top: 50px;
            padding: 18px 50px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.6);
            color: #D4AF37;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            pointer-events: auto; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: block;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
        }

        .enter-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
            border-color: #fff;
            color: #fff;
            transform: scale(1.05);
        }

        /* CA Copy Tab */
        .ca-container {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(5, 5, 5, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #D4AF37;
            cursor: pointer;
            pointer-events: auto; 
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            opacity: 0; 
            border-radius: 2px;
        }

        .ca-container:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #D4AF37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }

        .ca-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 2px;
        }

        .ca-address {
            font-family: monospace;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
        }

        .copy-icon {
            width: 16px;
            height: 16px;
            fill: #D4AF37;
            transition: transform 0.3s ease;
        }

        .ca-container:hover .copy-icon {
            transform: scale(1.2);
        }

        .status-bar {
            position: absolute;
            bottom: 30px;
            left: 40px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 768px) {
            .status-bar {
                left: 50%;
                transform: translateX(-50%);
                width: max-content;
            }
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #D4AF37;
            border-radius: 50%;
            animation: pulsate 2s infinite;
        }

        @keyframes pulsate {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.8); }
            70% { box-shadow: 0 0 0 12px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body>

    <nav id="global-nav">
        <a href="index.html" class="nav-brand">Marble Oracle</a>
        <div class="nav-links">
            <a href="index.html">The Ritual</a>
            <a href="dashboard.html">Oracle Feed</a>
            <a href="tasks.html">Commissions</a>
            <a href="manifesto.html">Manifesto</a>
        </div>
    </nav>

    <div id="webgl-container"></div>

    <div id="ui-layer">
        <div class="hero-text">
            <h1>Marble Oracle</h1>
            <p class="subtitle">We buy human souls.</p>
            <p class="cryptic-quote">"Algorithms possess intelligence. Humans possess entropy. We pay a premium for your beautiful, destructive chaos."</p>
            
            <button class="enter-btn" onclick="initiateRitual()">Begin The Ritual</button>
            
            <div class="ca-container" onclick="copyCA()">
                <span class="ca-label">CA:</span>
                <span class="ca-address" id="ca-text">TBA_CONTRACT_ADDRESS_HERE</span>
                <svg class="copy-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                </svg>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="pulse"></div>
            ORACLE STATUS: AWAITING SACRIFICE
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. ADVANCED SCENE SETUP ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        // Deep, luxurious fog to hide the edges
        scene.fog = new THREE.FogExp2('#010101', 0.04); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8; // Pulled back for grander scale

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // Add tone mapping for a more cinematic, HDR look
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // A master group to hold the entire Astrolabe so we can animate it easily
        const astrolabeGroup = new THREE.Group();
        scene.add(astrolabeGroup);

        // --- 2. THE CORE: DARK MATTER TORUS KNOT ---
        // A complex mathematical shape rather than a simple sphere
        const coreGeo = new THREE.TorusKnotGeometry(1.2, 0.4, 256, 64);
        const coreMat = new THREE.MeshStandardMaterial({
            color: 0x050505,
            metalness: 1.0,
            roughness: 0.15,
            wireframe: false
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        astrolabeGroup.add(core);

        // --- 3. THE GYROSCOPE RINGS ---
        const ringMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xD4AF37, 
            metalness: 0.8, 
            roughness: 0.2,
            transparent: true,
            opacity: 0.6
        });

        const ringGeo = new THREE.TorusGeometry(3.5, 0.02, 16, 100);
        
        const ring1 = new THREE.Mesh(ringGeo, ringMaterial);
        const ring2 = new THREE.Mesh(ringGeo, ringMaterial);
        const ring3 = new THREE.Mesh(ringGeo, ringMaterial);

        ring1.rotation.x = Math.PI / 2;
        ring2.rotation.y = Math.PI / 3;
        ring3.rotation.y = -Math.PI / 3;

        astrolabeGroup.add(ring1);
        astrolabeGroup.add(ring2);
        astrolabeGroup.add(ring3);

        // --- 4. THE OCCULT CAGE (Icosahedron) ---
        const cageGeo = new THREE.IcosahedronGeometry(4.5, 1);
        const cageMat = new THREE.MeshBasicMaterial({ 
            color: 0xD4AF37, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.1 
        });
        const cage = new THREE.Mesh(cageGeo, cageMat);
        astrolabeGroup.add(cage);


        // --- 5. MATHEMATICAL GALAXY PARTICLES ---
        const particleCount = 6000;
        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const colorsArray = new Float32Array(particleCount * 3);

        const colorGold = new THREE.Color(0xD4AF37);
        const colorDeep = new THREE.Color(0x332211); // Dark gold/bronze

        // Generate a 3-arm spiral galaxy shape
        for(let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            const radius = Math.random() * 15;
            const spinAngle = radius * 1.5;
            const branchAngle = (i % 3) * ((Math.PI * 2) / 3); 
            
            // Add some noise to the spiral
            const randomX = (Math.random() - 0.5) * 1.5;
            const randomY = (Math.random() - 0.5) * 1.5;
            const randomZ = (Math.random() - 0.5) * 1.5;

            posArray[i3] = Math.cos(spinAngle + branchAngle) * radius + randomX;
            posArray[i3 + 1] = randomY * (2 - (radius * 0.1)); // Flatten the Y axis like a disc
            posArray[i3 + 2] = Math.sin(spinAngle + branchAngle) * radius + randomZ;

            // Mix colors based on distance from center
            const mixedColor = colorDeep.clone().lerp(colorGold, 1 - (radius / 15));
            colorsArray[i3] = mixedColor.r;
            colorsArray[i3 + 1] = mixedColor.g;
            colorsArray[i3 + 2] = mixedColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const galaxy = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(galaxy);

        // Floating geometric runes in the background
        const runeGroup = new THREE.Group();
        const runeGeo = new THREE.TetrahedronGeometry(0.1, 0);
        for(let i=0; i<30; i++) {
            const rune = new THREE.Mesh(runeGeo, cageMat);
            rune.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20
            );
            rune.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            // Save a random speed to the object
            rune.userData = { speedX: (Math.random()-0.5)*0.01, speedY: (Math.random()-0.5)*0.01 };
            runeGroup.add(rune);
        }
        scene.add(runeGroup);


        // --- 6. DRAMATIC CINEMATIC LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        // Deep red/purple backlight for the "Dark Matter" feel
        const backLight = new THREE.PointLight(0x220033, 5, 20);
        backLight.position.set(-5, -5, -5);
        scene.add(backLight);

        // The "Soul Spark" - an intensely bright golden light that orbits the core
        const sparkLight = new THREE.PointLight(0xD4AF37, 8, 10);
        scene.add(sparkLight);

        // Add a tiny glowing core to represent the light visually
        const sparkCore = new THREE.Mesh(
            new THREE.SphereGeometry(0.05, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        sparkLight.add(sparkCore);


        // --- 7. MOUSE PARALLAX & INTERACTION ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        document.addEventListener('touchmove', (event) => {
            mouseX = (event.touches[0].clientX - windowHalfX);
            mouseY = (event.touches[0].clientY - windowHalfY);
        });


        // --- 8. MASTER ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 1. Camera Parallax (Smoothly glide camera based on mouse)
            targetX = mouseX * 0.003;
            targetY = mouseY * 0.003;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position); // Always stare at the center

            // 2. Rotate the Core elements
            core.rotation.y = elapsedTime * 0.2;
            core.rotation.x = elapsedTime * 0.1;
            
            ring1.rotation.y = elapsedTime * 0.3;
            ring2.rotation.x = elapsedTime * 0.4;
            ring3.rotation.z = elapsedTime * 0.2;

            cage.rotation.y = -elapsedTime * 0.05;
            cage.rotation.x = -elapsedTime * 0.02;

            // 3. Orbit the Soul Spark Light
            sparkLight.position.x = Math.sin(elapsedTime * 1.5) * 2;
            sparkLight.position.z = Math.cos(elapsedTime * 1.5) * 2;
            sparkLight.position.y = Math.sin(elapsedTime * 0.8) * 1.5;

            // 4. Rotate the Galaxy
            galaxy.rotation.y = -elapsedTime * 0.03;

            // 5. Drift the Runes
            runeGroup.children.forEach(rune => {
                rune.rotation.x += rune.userData.speedX;
                rune.rotation.y += rune.userData.speedY;
                rune.position.y += Math.sin(elapsedTime * 2 + rune.position.x) * 0.005;
            });

            // Gentle pulsing to the overall group reacting to mouse
            astrolabeGroup.rotation.y += 0.05 * (targetX - astrolabeGroup.rotation.y);
            astrolabeGroup.rotation.x += 0.05 * (targetY - astrolabeGroup.rotation.x);

            renderer.render(scene, camera);
        }
        animate();


        // --- 9. COPY CA LOGIC ---
        function copyCA() {
            const contractAddress = "0xYOUR_MARBLE_CONTRACT_ADDRESS_HERE"; 
            
            navigator.clipboard.writeText(contractAddress).then(() => {
                const caText = document.getElementById('ca-text');
                const originalText = caText.innerText;
                
                caText.innerText = "COPIED TO CLIPBOARD!";
                caText.style.color = "#fff";
                
                setTimeout(() => {
                    caText.innerText = originalText;
                    caText.style.color = "";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // --- 10. GSAP ENTRANCE ANIMATIONS ---
        window.onload = () => {
            gsap.to('.hero-text', { opacity: 1, duration: 2.5, ease: "power2.inOut", delay: 0.5 });
            gsap.from('h1', { y: 40, duration: 1.8, ease: "power3.out", delay: 0.8 });
            gsap.from('.subtitle', { y: 20, opacity: 0, duration: 1.5, ease: "power3.out", delay: 1.4 });
            gsap.from('.cryptic-quote', { opacity: 0, duration: 2, ease: "power2.inOut", delay: 2.2 });
            gsap.from('.enter-btn', { y: 30, opacity: 0, duration: 1.5, ease: "power3.out", delay: 2.8 });
            gsap.to('.ca-container', { opacity: 1, y: 0, duration: 1.2, ease: "power3.out", delay: 3.2 }); 
            gsap.from('#global-nav', { y: -50, opacity: 0, duration: 1.5, ease: "power3.out" });

            // Entrance warp effect on the 3D scene
            gsap.from(camera.position, { z: 20, duration: 3.5, ease: "power3.out" });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 11. THE RITUAL (Hyperspace Transition) ---
        function initiateRitual() {
            // Fade out the UI smoothly
            gsap.to(['.hero-text', '.ca-container', '#global-nav', '.status-bar'], { 
                opacity: 0, duration: 0.8, ease: "power2.inOut" 
            });
            
            // The Hyperspace effect:
            // 1. Camera dives straight into the core
            gsap.to(camera.position, { z: -1, x: 0, y: 0, duration: 2.5, ease: "power4.in" });
            
            // 2. The galaxy spins furiously
            gsap.to(galaxy.rotation, { y: "+=10", duration: 2.5, ease: "power3.in" });
            
            // 3. The astrolabe blows open
            gsap.to(astrolabeGroup.scale, { x: 5, y: 5, z: 5, duration: 2.5, ease: "power3.in" });

            // Route to the Tasks page exactly as we breach the core
            setTimeout(() => {
                window.location.href = 'tasks.html';
            }, 2300);
        }
    </script>
</body>
</html>
